<main class="equipo-page">
  <section class="equipo-hero">
    <p class="eyebrow">El equipo</p>
    <h1>Nuestro equipo</h1>
    <p>Conocé a nuestras profesionales de la salud.</p>
  </section>

  <div class="loading-state" *ngIf="loading">Cargando equipo...</div>

  <p class="error-state" *ngIf="error">{{ error }}</p>

  <div class="team-grid" *ngIf="!loading && !error">
    <article
      class="team-card"
      [class.team-card--open]="member.expanded"
      *ngFor="let member of members"
      (click)="toggle(member)">

      <div class="team-card-top">
        <img [src]="member.image" [alt]="member.name" class="team-avatar" />
        <div class="team-card-info">
          <h2>{{ member.name }}</h2>
          <p class="especialidad">{{ member.especialidad }}</p>
          <p class="matricula">Mat. {{ member.matricula }}</p>
        </div>
        <span class="toggle-icon" aria-hidden="true">{{ member.expanded ? '−' : '+' }}</span>
      </div>

      <div class="team-card-bio" *ngIf="member.expanded">
        <p>{{ member.bio }}</p>
      </div>

    </article>
  </div>
</main>

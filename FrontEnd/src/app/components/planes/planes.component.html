<main class="planes-page">

  <div class="planes-header">
    <h1>Nuestros planes de salud</h1>
    <p>Elegí el plan que mejor se adapta a tu estilo de vida y comenzá tu seguimiento hoy.</p>
  </div>

  <div class="planes-grid">
    <article class="plan-card" [class.plan-card--featured]="plan.featured" *ngFor="let plan of plans">
      <div class="plan-badge" *ngIf="plan.featured">{{ plan.badge || 'Más elegido' }}</div>

      <div class="plan-icon" [ngSwitch]="plan.name">
        <!-- Básico: leaf -->
        <svg *ngSwitchCase="'Básico'" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="24" fill="#e8f4ec"/>
          <path d="M24 37c0 0-11-6-11-16a11 11 0 0 1 22 0c0 10-11 16-11 16z" fill="#2d9e6a" opacity=".9"/>
          <line x1="24" y1="37" x2="24" y2="22" stroke="#1e6f4a" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M24 29 q-5-4-6-9" stroke="#1e6f4a" stroke-width="1.4" stroke-linecap="round" fill="none"/>
        </svg>
        <!-- Intermedio: shield star -->
        <svg *ngSwitchCase="'Intermedio'" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="24" fill="#e8eefa"/>
          <path d="M24 10 L34 15 V25 C34 31 30 36 24 38 C18 36 14 31 14 25 V15 L24 10Z" fill="#113a8f" opacity=".9"/>
          <path d="M24 19l1.7 3.4 3.7.55-2.7 2.6.64 3.75L24 27.5l-3.34 1.8.64-3.76L18.6 22.95l3.7-.55L24 19z" fill="#ffffff"/>
        </svg>
        <!-- Intensivo: crown -->
        <svg *ngSwitchDefault viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="24" fill="#fef3e2"/>
          <path d="M11 33 L15 20 L21 27 L24 16 L27 27 L33 20 L37 33 Z" fill="#e6900a" opacity=".9"/>
          <rect x="11" y="33" width="26" height="3" rx="1.5" fill="#c47a09"/>
          <circle cx="24" cy="16" r="2" fill="#f5b730"/>
          <circle cx="15" cy="20" r="2" fill="#f5b730"/>
          <circle cx="33" cy="20" r="2" fill="#f5b730"/>
        </svg>
      </div>

      <div class="plan-name">{{ plan.name }}</div>
      <div class="plan-price">$ {{ plan.price | number:'1.0-0':'es-AR' }}<span>{{ plan.period }}</span></div>
      <ul class="plan-features">
        <li *ngFor="let feature of plan.features">{{ feature }}</li>
      </ul>
      <button type="button" class="plan-btn" (click)="addToCart(plan)">Comprar</button>
    </article>

  </div>

</main>
